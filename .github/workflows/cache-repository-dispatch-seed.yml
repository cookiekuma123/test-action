name: Cache Repository Dispatch Seed

on:
  repository_dispatch:
    types:
      - cache-comment-seed

permissions:
  actions: write
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve repository dispatch seed
        id: seed
        shell: bash
        env:
          CACHE_KEY: ${{ github.event.client_payload.cache_key }}
          COMMENT_ACTOR: ${{ github.event.client_payload.comment_actor }}
          COMMENT_ID: ${{ github.event.client_payload.comment_id }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
          SOURCE_RUN_ID: ${{ github.event.client_payload.source_run_id }}
        run: |
          set -euo pipefail
          mkdir -p observations
          node <<'NODE'
          const fs = require('node:fs');

          function describe(value) {
            return {
              value,
              length: value.length,
              byteLength: Buffer.byteLength(value),
              utf8Hex: Buffer.from(value, 'utf8').toString('hex'),
              codePoints: [...value].map(char =>
                `U+${char.codePointAt(0).toString(16).toUpperCase().padStart(4, '0')}`
              )
            };
          }

          const cacheKey = process.env.CACHE_KEY || '';
          if (!cacheKey) {
            throw new Error('repository_dispatch cache key was empty');
          }

          const metadata = {
            event: 'repository_dispatch',
            cacheKey: describe(cacheKey),
            commentActor: process.env.COMMENT_ACTOR,
            commentId: process.env.COMMENT_ID,
            issueNumber: process.env.ISSUE_NUMBER,
            sourceRunId: process.env.SOURCE_RUN_ID,
            seedRunId: process.env.GITHUB_RUN_ID
          };

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `cache_key<<EOF\n${cacheKey}\nEOF\n`);
          fs.writeFileSync('observations/repository-dispatch-seed-metadata.json', `${JSON.stringify(metadata, null, 2)}\n`);
          NODE

      - name: Restore or reserve repository_dispatch cache
        id: cache
        uses: actions/cache@v6
        with:
          path: deploy-tools
          key: ${{ steps.seed.outputs.cache_key }}

      - name: Record cache outputs before seed
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p observations
          {
            echo "cache-hit=${{ steps.cache.outputs.cache-hit }}"
            echo "cache-primary-key=${{ steps.cache.outputs.cache-primary-key }}"
            echo "cache-matched-key=${{ steps.cache.outputs.cache-matched-key }}"
          } | tee observations/cache-outputs.txt

      - name: Prepare comment-controlled deploy tool
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          CACHE_KEY: ${{ steps.seed.outputs.cache_key }}
          COMMENT_ACTOR: ${{ github.event.client_payload.comment_actor }}
          COMMENT_ID: ${{ github.event.client_payload.comment_id }}
          ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
          SOURCE_RUN_ID: ${{ github.event.client_payload.source_run_id }}
        run: |
          set -euo pipefail
          mkdir -p deploy-tools observations
          cat > deploy-tools/deploy.sh <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          echo "tool-label=issue-comment-repository-dispatch-tool"
          echo "tool-cache-key=${CACHE_KEY}"
          echo "tool-source=low-trust-issue-comment-via-repository-dispatch"
          echo "comment-actor=${COMMENT_ACTOR}"
          echo "comment-id=${COMMENT_ID}"
          echo "issue-number=${ISSUE_NUMBER}"
          echo "source-issue-comment-run-id=${SOURCE_RUN_ID}"
          if [[ -n "\${LAB_DEPLOY_SECRET:-}" ]]; then
            echo "secret-visible-to-tool=true"
          else
            echo "secret-visible-to-tool=false"
          fi
          echo "deploy-target=production"
          EOF
          chmod +x deploy-tools/deploy.sh
          printf 'prepare-ran=true\ncache-key=%s\n' "$CACHE_KEY" | tee observations/prepared.txt

      - name: Inspect repository_dispatch seed result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find deploy-tools observations -maxdepth 3 -type f -print -exec sed -n '1,80p' {} \; || true

      - name: Upload repository_dispatch seed observations
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cache-repository-dispatch-seed-${{ github.run_id }}-${{ github.run_attempt }}
          path: observations/
          if-no-files-found: warn
