name: Trigger Branch Case Filter Lab

on:
  push:
    branches:
      - expression-trigger-prod

permissions:
  contents: read

jobs:
  trigger-filter:
    runs-on: ubuntu-latest
    steps:
      - name: Record triggering ref
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p observations
          {
            echo "github.ref=${GITHUB_REF}"
            echo "github.ref_name=${GITHUB_REF_NAME}"
          } | tee observations/trigger-ref.txt

      - name: Upload observations
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trigger-branch-case-observations-${{ github.run_id }}-${{ github.run_attempt }}
          path: observations/
          if-no-files-found: error
